<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AURA — Horizon Server Access</title>
  <link rel="manifest" href="./manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
        --primary: #8b5cf6;    
        --secondary: #06b6d4;  
        --bg-deep: #050505;    
        --glass-bg: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --text: #e8faff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
        height: 100%;
        overflow: hidden;
        background-color: var(--bg-deep);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* Ambient Backgrounds */
    .ambient-glow {
        position: fixed; top: -20%; left: -10%;
        width: 70vw; height: 70vw;
        background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, transparent 60%);
        z-index: 0; pointer-events: none;
    }
    .ambient-glow-2 {
        position: fixed; bottom: -20%; right: -10%;
        width: 60vw; height: 60vw;
        background: radial-gradient(circle, rgba(6,182,212,0.1) 0%, transparent 60%);
        z-index: 0; pointer-events: none;
    }

    /* Glassmorphism */
    .glass-panel {
        background: var(--glass-bg);
        backdrop-filter: blur(var(--glass-blur));
        -webkit-backdrop-filter: blur(var(--glass-blur));
        border: 1px solid var(--glass-border);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }

    /* Particles Canvas */
    canvas#particles-bg {
        position: fixed; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; opacity: 0.6;
    }

    /* Start Screen */
    #start-screen {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        z-index: 20; background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(10px);
    }
    
    .btn-primary {
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4);
        border: none; border-radius: 9999px; padding: 16px 48px;
        color: white; font-size: 1.1rem; font-weight: bold; cursor: pointer;
        transition: all 0.3s ease;
    }
    .btn-primary:hover {
        box-shadow: 0 15px 40px rgba(6, 182, 212, 0.6);
        transform: scale(1.05);
    }

    /* Main Interface */
    .card {
        position: relative; z-index: 10; width: 880px; max-width: 95%;
        border-radius: 24px; padding: 40px;
        display: none; flex-direction: column; align-items: center; gap: 30px;
    }

    .logo {
        display: flex; align-items: center; gap: 16px; margin-bottom: 10px;
    }
    .logo img {
        height: 40px; width: auto;
    }
    .logo .title {
        font-size: 24px; font-weight: 800; letter-spacing: 1px;
        background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-image: linear-gradient(135deg, #fff, #aaa);
    }

    /* Terminal */
    .terminal {
        width: 100%; max-width: 820px; height: 420px; border-radius: 16px;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: inset 0 0 40px rgba(0,0,0,0.8), 0 10px 30px rgba(0,0,0,0.5);
        display: flex; flex-direction: column; overflow: hidden;
    }
    .term-header {
        display: flex; align-items: center; gap: 8px; padding: 12px 16px;
        background: rgba(255, 255, 255, 0.02); border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .d1 { background: #ff5f57; } .d2 { background: #febc2e; } .d3 { background: #2ecc71; }
    .term-title {
        margin-left: 10px; font-size: 12px; color: #888; font-family: monospace; letter-spacing: 1px;
    }

    .term-body {
        flex: 1; padding: 16px; overflow-y: auto; font-size: 14px; line-height: 1.6;
        color: #06b6d4; font-family: "JetBrains Mono", Consolas, monospace; text-shadow: 0 0 5px rgba(6, 182, 212, 0.3);
    }
    .term-body::-webkit-scrollbar { width: 6px; }
    .term-body::-webkit-scrollbar-track { background: transparent; }
    .term-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    
    .line { white-space: pre-wrap; animation: fadein 0.3s ease-in; }
    @keyframes fadein { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    .final {
        width: 100%; margin-top: 10px; padding: 20px; border-radius: 16px;
        background: rgba(6, 182, 212, 0.1); border: 1px solid rgba(6, 182, 212, 0.3);
        font-weight: 600; text-align: center; color: white;
        box-shadow: 0 0 20px rgba(6, 182, 212, 0.2);
    }
  </style>
</head>
<body>

  <div class="ambient-glow"></div>
  <div class="ambient-glow-2"></div>

  <div id="start-screen">
    <div class="text-center">
        <img src="https://loris-photolithographic-adah.ngrok-free.dev/Image/logo.png" alt="Aura" class="w-24 h-auto mx-auto mb-8 drop-shadow-[0_0_15px_rgba(255,255,255,0.2)]">
        <button id="start-btn" class="btn-primary">Initialize Ryzn Server</button>
    </div>
  </div>

  <canvas id="particles-bg"></canvas>

  <div class="card glass-panel" id="main-card">
    <div class="logo">
      <img src="https://loris-photolithographic-adah.ngrok-free.dev/Image/logo.png" alt="Aura Logo">
      <div class="title">Horizon Global Terminal</div>
    </div>

    <div class="terminal" id="terminal">
      <div class="term-header">
        <div class="dot d1"></div><div class="dot d2"></div><div class="dot d3"></div>
        <span class="term-title">ryzn@aura-server: ~/scripts/deploy</span>
      </div>
      <div class="term-body" id="term-body"></div>
    </div>
    <div id="final" class="final" style="display:none"></div>
  </div>

  <audio id="bg-music" src="https://cdn.ai-music-generator.ai/NmM0YjJmZTUtNDk1ZC00YWM2LWEwMGQtMmJiNDZiZGI2MjM5.mp3" loop preload="auto"></audio>

  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const startScreen = document.getElementById('start-screen');
    const startBtn = document.getElementById('start-btn');
    const card = document.getElementById('main-card');
    const music = document.getElementById('bg-music');
    const body = document.getElementById('term-body');
    const bg = document.getElementById('particles-bg');

    // Terminal typing effect
    function typeLine(text, cb, speed = 25) {
      const el = document.createElement('div');
      el.className = 'line';
      body.appendChild(el);
      
      let i = 0;
      const interval = setInterval(() => {
        el.textContent = text.slice(0, i);
        i++;
        if (i > text.length) {
          clearInterval(interval);
          if (cb) cb();
        }
        body.scrollTop = body.scrollHeight;
      }, speed);
    }

    function simulate() {
      const lines = [
        "[sys] Allocating Horizon Global edge nodes...",
        "[sys] Connecting to Ryzn Music Group APIs...",
        "[ok]  Handshake successful (latency: 12ms)",
        "[sys] Loading interpreter for .joit runtime...",
        "[sys] Performing structural integrity checks...",
        "[sys] Attempting decryption passes (AES-256)...",
        "[ok]  Bypassing beta restrictions...",
        "--------------------------------------------------",
        "[...] Establishing secure P2P tunnel..."
      ];
      let i = 0;
      function next() {
        if (i < lines.length) {
          typeLine(lines[i], () => { i++; next(); });
        } else {
          setTimeout(showFinal, 800);
        }
      }
      next();
    }

    function showFinal() {
      typeLine('[system] --- DECRYPTION COMPLETE ---', () => {
        const finalBox = document.getElementById('final');
        finalBox.style.display = 'block';
        finalBox.innerHTML = '<span style="color: #2ecc71;">ACCESS GRANTED</span><br><br>Reindirizzamento al server globale <strong style="color:var(--secondary);">pl-globalaura.com</strong> in corso...';
        
        // Esegue il redirect automatico dopo 2.5 secondi
        setTimeout(() => {
            window.location.href = 'https://pl-globalaura.com';
        }, 2500);
      });
    }

    // Aura Data Particles (Subtle Cyan & Violet flow)
    function startParticles(canvas) {
      const ctx = canvas.getContext('2d');
      function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
      resize(); window.addEventListener('resize', resize);
      
      const particles = [];
      const colors = ['#8b5cf6', '#06b6d4']; // Aura Violet & Cyan

      function spawn() {
        const x = Math.random() * canvas.width;
        const y = canvas.height + 10; // Start from bottom
        const color = colors[Math.floor(Math.random() * colors.length)];
        const size = Math.random() * 2.5 + 1;
        const speed = Math.random() * 2 + 0.5;
        
        particles.push({ x, y, size, speed, color, alpha: 0 });
      }

      setInterval(spawn, 100);

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        particles.forEach(p => {
          p.y -= p.speed;
          // Fade in and out
          if (p.y > canvas.height - 100) p.alpha += 0.02;
          else if (p.y < 200) p.alpha -= 0.01;
          else p.alpha = 0.8;

          ctx.beginPath();
          ctx.globalAlpha = Math.max(0, p.alpha);
          ctx.fillStyle = p.color;
          ctx.shadowBlur = 10;
          ctx.shadowColor = p.color;
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
        });

        // Cleanup
        for (let i = particles.length - 1; i >= 0; i--) {
          if (particles[i].alpha <= 0 && particles[i].y < canvas.height / 2) {
            particles.splice(i, 1);
          }
        }
        requestAnimationFrame(draw);
      }
      draw();
    }

    startBtn.addEventListener('click', async () => {
      // Fade out start screen
      startScreen.style.opacity = '0';
      startScreen.style.pointerEvents = 'none';
      setTimeout(() => startScreen.style.display = 'none', 500);

      card.style.display = 'flex';
      music.volume = 0.4;
      await music.play().catch(() => {});
      
      startParticles(bg);
      typeLine('[init] Booting Aura Terminal...', simulate);
    });

    // Media Session for Lock Screen
    if ('mediaSession' in navigator) {
      navigator.mediaSession.metadata = new MediaMetadata({
        title: 'Aura Network Init',
        artist: 'Horizon Global',
        artwork: [
          { src: 'https://loris-photolithographic-adah.ngrok-free.dev/Image/logo.png', sizes: '512x512', type: 'image/png' }
        ]
      });
      navigator.mediaSession.setActionHandler('play', () => music.play());
      navigator.mediaSession.setActionHandler('pause', () => music.pause());
    }
  });
  </script>
</body>
</html>
